version: '3.9'

services:
  mongodb:
    image: mongo:7
    container_name: canvas-editor-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: canvas-editor

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: canvas-editor-backend
    restart: unless-stopped
    ports:
      - '4000:4000'
    environment:
      PORT: 4000
      MONGODB_URI: mongodb://mongodb:27017/canvas-editor
      NODE_ENV: production
      FRONTEND_URL: http://localhost:5173
    depends_on:
      - mongodb
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: canvas-editor-frontend
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - backend

volumes:
  mongo_data:
  uploads_data: